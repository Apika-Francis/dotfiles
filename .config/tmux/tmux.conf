set-option -sa terminal-overrides ",xterm*:Tc"
set -sg escape-time 1
set -g mouse on
set -w -g mode-keys vi
set -g base-index 1
set -w -g pane-base-index 1
set-option -g status-position bottom
set-option -g renumber-windows on
bind r source-file ~/.config/tmux/tmux.conf
set -g default-terminal "tmux-256color"
# Activity alerts
set -w -g monitor-activity on
set -w -g visual-activity on

# Status bar colors - Dark bar with cyan text
set-option -g status-style bg='#1e1e2e',fg='#89dceb'

# Window status format - cyan text on dark background
set-window-option -g window-status-style fg='#89dceb',bg='#1e1e2e'
set-window-option -g window-status-current-style fg='#89dceb',bg='#1e1e2e'

# Status bar content
set-option -g status-left-length 100
set-option -g status-right-length 100
set-option -g status-left "[#S] "
set-option -g status-right " #(whoami)@#H "

# Pane borders
set-option -g pane-border-style fg='#313244'
set-option -g pane-active-border-style fg='#89dceb'

# Message style
set-option -g message-style bg='#1e1e2e',fg='#89dceb'

# vim-like pane switching
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R


# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
run '~/.tmux/plugins/tpm/tpm'
